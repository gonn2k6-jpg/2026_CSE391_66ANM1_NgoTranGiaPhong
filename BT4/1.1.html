<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 1.1 - Bảng điểm sinh viên</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Bảng điểm sinh viên</h1>

    <div class="form-group">
      <input type="text" id="fullname" placeholder="Nhập họ tên">
      <input type="number" id="score" placeholder="Nhập điểm" min="0" max="10" step="0.1">
      <button id="btnAdd">Thêm</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th>Điểm</th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>

    <div id="stats" class="stats">Tổng SV: 0 | Điểm TB: 0.00</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
