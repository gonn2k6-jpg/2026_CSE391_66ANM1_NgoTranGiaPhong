<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 2.2 - Form đặt hàng</title>
  <link rel="stylesheet" href="style2.204.css">
</head>
<body>
  <div class="container">
    <h1>Form đặt hàng trực tuyến</h1>

    <form id="orderForm">
      <div class="form-group">
        <label for="product">Tên sản phẩm</label>
        <select id="product">
          <option value="">-- Chọn sản phẩm --</option>
          <option value="Áo">Áo</option>
          <option value="Quần">Quần</option>
          <option value="Giày">Giày</option>
          <option value="Túi">Túi</option>
        </select>
        <span class="error" id="productError"></span>
      </div>

      <div class="form-group">
        <label for="quantity">Số lượng</label>
        <input type="number" id="quantity" min="1" max="99">
        <span class="error" id="quantityError"></span>
      </div>

      <div id="totalPrice" class="total-price">Tổng tiền: 0 đ</div>

      <div class="form-group">
        <label for="deliveryDate">Ngày giao hàng</label>
        <input type="date" id="deliveryDate">
        <span class="error" id="deliveryDateError"></span>
      </div>

      <div class="form-group">
        <label for="address">Địa chỉ giao</label>
        <input type="text" id="address">
        <span class="error" id="addressError"></span>
      </div>

      <div class="form-group">
        <label for="note">Ghi chú</label>
        <textarea id="note"></textarea>
        <div id="noteCounter" class="counter">0/200</div>
        <span class="error" id="noteError"></span>
      </div>

      <div class="form-group">
        <label>Phương thức thanh toán</label>
        <div class="inline-group">
          <label><input type="radio" name="payment" value="COD"> COD</label>
          <label><input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản</label>
          <label><input type="radio" name="payment" value="Ví điện tử"> Ví điện tử</label>
        </div>
        <span class="error" id="paymentError"></span>
      </div>

      <button type="submit">Đặt hàng</button>
    </form>

    <div id="confirmBox" class="box"></div>
    <div id="successBox" class="box success-box"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
