<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 1.2 - Tìm kiếm và lọc</title>
  <link rel="stylesheet" href="style1.2.css">
</head>
<body>
  <div class="container">
    <h1>Tìm kiếm, lọc và sắp xếp sinh viên</h1>

    <div class="form-group">
      <input type="text" id="fullname" placeholder="Nhập họ tên">
      <input type="number" id="score" placeholder="Nhập điểm" min="0" max="10" step="0.1">
      <button id="btnAdd">Thêm</button>
    </div>

    <div class="filter-group">
      <input type="text" id="search" placeholder="Tìm kiếm theo tên...">
      <select id="filterRank">
        <option value="all">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="scoreHeader" class="sortable">Điểm</th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>

    <div id="stats" class="stats">Tổng SV: 0 | Điểm TB: 0.00</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
