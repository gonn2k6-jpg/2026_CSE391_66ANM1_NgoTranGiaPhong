<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 2.1 - Form đăng ký</title>
  <link rel="stylesheet" href="style2.104.css">
</head>
<body>
  <div class="container">
    <h1>Form đăng ký tài khoản</h1>

    <form id="registerForm">
      <div class="form-group">
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname">
        <span class="error" id="fullnameError"></span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email">
        <span class="error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="phone">Số điện thoại</label>
        <input type="text" id="phone">
        <span class="error" id="phoneError"></span>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password">
        <span class="error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword">
        <span class="error" id="confirmPasswordError"></span>
      </div>

      <div class="form-group">
        <label>Giới tính</label>
        <div class="inline-group">
          <label><input type="radio" name="gender" value="Nam"> Nam</label>
          <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
          <label><input type="radio" name="gender" value="Khác"> Khác</label>
        </div>
        <span class="error" id="genderError"></span>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="terms">
          Tôi đồng ý với điều khoản
        </label>
        <span class="error" id="termsError"></span>
      </div>

      <button type="submit">Đăng ký</button>
    </form>

    <div id="successMessage" class="success-box"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
