<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Listeners</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #myButton {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #myButton.active {
      background-color: green;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .box {
      width: 250px;
      height: 120px;
      background: #f1f1f1;
      border: 2px solid #ccc;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    .hovered {
      background-color: orange;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Thực hành Event Listeners</h1>

  <button id="myButton">Nhấn vào tôi</button>
  <p id="status">Chưa có tương tác</p>

  <div id="hoverBox" class="box">Di chuột vào đây</div>

  <script src="b4bt03.js"></script>
</body>
</html>
