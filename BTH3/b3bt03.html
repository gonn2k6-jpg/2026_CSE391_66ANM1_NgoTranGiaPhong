<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attributes & Classes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    img {
      width: 250px;
      height: auto;
      display: block;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .highlight {
      border: 4px solid red;
      padding: 10px;
      background-color: #fff3cd;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Thực hành Attributes & Classes</h1>

  <img
    id="myImage"
    src="https://via.placeholder.com/250x150?text=Anh+Ban+Dau"
    alt="Ảnh ban đầu"
  >

  <p id="message">Đây là đoạn văn mẫu.</p>

  <button id="btnChangeImg">Đổi ảnh</button>
  <button id="btnAddClass">Thêm class highlight</button>
  <button id="btnRemoveClass">Xóa class highlight</button>
  <button id="btnToggle">Bật/Tắt hidden</button>
  <button id="btnCheck">Kiểm tra class</button>

  <script src="bt3bt03.js"></script>
</body>
</html>
